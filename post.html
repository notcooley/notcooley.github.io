<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.8;
            color: #333;
            background-color: #e1dcdc;
        }

        /* Navigation */
        nav {
            background: #f18724;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #ecf0f1;
            text-decoration: none;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
        }

        .nav-links a:hover {
            color: rgb(255, 255, 255);
        }

        /* Main Content */
        main {
            margin-top: 80px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            padding: 4rem 2rem;
        }

        .post-header {
            margin-bottom: 3rem;
            border-bottom: 2px solid #f18724;
            padding-bottom: 2rem;
        }

        .post-header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .post-meta {
            color: #7f8c8d;
            font-size: 0.95rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: flex;
            align-items: center;
        }

        .post-content {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .post-content h2 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin: 2rem 0 1rem 0;
        }

        .post-content h3 {
            font-size: 1.4rem;
            color: #34495e;
            margin: 1.5rem 0 0.75rem 0;
        }

        .post-content p {
            margin-bottom: 1.5rem;
            line-height: 1.9;
        }

        .post-content ul, .post-content ol {
            margin: 1.5rem 0 1.5rem 2rem;
        }

        .post-content li {
            margin-bottom: 0.5rem;
        }

        .post-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }

        .post-content pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #f18724;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #ff7b00;
        }

        /* Footer */
        footer {
            background: #f18724;
            color: #ecf0f1;
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
        }

        @media (max-width: 768px) {
            .post-header h1 {
                font-size: 1.8rem;
            }

            main {
                padding: 2rem 1rem;
            }

            .post-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Aidan Cooley</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="resume.pdf" target="_blank">Resume</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <a href="blog.html" class="back-link">← Back to Blog</a>
        
        <article id="post" class="post-container">
            <div class="post-header">
                <h1 id="post-title">Loading...</h1>
                <div class="post-meta" id="post-meta">
                    <span id="post-date"></span>
                    <span id="post-author"></span>
                </div>
            </div>

            <div class="post-content" id="post-body">
                <!-- Post content will be loaded here -->
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Aidan Cooley. All rights reserved.</p>
    </footer>

    <script>
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            if (!slug) {
                document.getElementById('post-body').innerHTML = '<p>Post not found.</p>';
                return;
            }

            try {
                const response = await fetch(`https://raw.githubusercontent.com/notcooley/notcooley.github.io/main/posts/${slug}.md`);
                const content = await response.text();

                // Parse frontmatter
                const frontmatterRegex = /^---\n([\s\S]*?)\n---/;
                const match = content.match(frontmatterRegex);
                let post = {};
                let body = content;

                if (match) {
                    const raw = match[1];
                    const lines = raw.split('\n');
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        const [key, ...valueParts] = line.split(':');
                        post[key.trim()] = valueParts.join(':').trim();
                    });
                    body = content.replace(frontmatterRegex, '').trim();
                }

                // Format date
                const date = new Date(post.date);
                const formattedDate = date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                // Update page
                document.title = `${post.title} - Blog`;
                document.getElementById('post-title').textContent = post.title || 'Untitled';
                document.getElementById('post-date').textContent = formattedDate;
                document.getElementById('post-author').textContent = post.author || 'Anonymous';

                // Convert markdown to HTML
                const html = markdownToHtml(body);
                document.getElementById('post-body').innerHTML = html;

            } catch (error) {
                console.error('Error loading post:', error);
                document.getElementById('post-body').innerHTML = '<p>Error loading post.</p>';
            }
        }

        function markdownToHtml(markdown) {
            let html = markdown;

            // Headers
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

            // Bold and italic
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');

            // Code blocks
            html = html.replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');

            // Links
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Lists
            html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');

            // Paragraphs
            html = html.split('\n\n').map(para => {
                if (para.match(/<[^>]+>/)) return para;
                return `<p>${para}</p>`;
            }).join('');

            return html;
        }

        // Load post when page is ready
        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
