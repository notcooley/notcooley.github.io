<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aidan Cooley - Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #e1dcdc;
        }

        /* Navigation */
        nav {
            background: #f18724;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #ecf0f1;
            text-decoration: none;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }

        .nav-links a:hover {
            color: rgb(255, 255, 255);
            background-color: rgba(52, 152, 219, 0.1);
        }

        /* Main Content */
        main {
            margin-top: 80px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 4rem 2rem;
        }

        .blog-header {
            text-align: center;
            padding: 3rem 0;
            background-image: linear-gradient(rgba(241, 135, 36, 0), rgb(42, 51, 123)), url('stary.webp');
            color: white;
            border-radius: 10px;
            margin-bottom: 3rem;
        }

        .blog-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .blog-header p {
            font-size: 1.2rem;
        }

        /* Blog Posts */
        .blog-post {
            background: white;
            border-radius: 10px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .blog-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .blog-post-header {
            border-bottom: 2px solid #f18724;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .blog-post h2 {
            color: #2c3e50;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .blog-meta {
            color: #7f8c8d;
            font-size: 0.9rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .blog-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .blog-post-content {
            color: #555;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .blog-post-content p {
            margin-bottom: 1rem;
        }

        .read-more {
            background: #f18724;
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            transition: background 0.3s ease;
        }

        .read-more:hover {
            background: #ff7b00;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .tag {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        /* Footer */
        footer {
            background: #f18724;
            color: #ecf0f1;
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .blog-header h1 {
                font-size: 2rem;
            }

            .blog-post h2 {
                font-size: 1.5rem;
            }

            main {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Aidan Cooley</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="resume.pdf" target="_blank">Resume</a></li>

                 <a href="#" id="external-link">Links</a>
                <div class="dropdown-content">
                <a href="https://www.linkedin.com/in/aidan-cooley-728b32247/" target="_blank">LinkedIn</a>
                <a href="https://github.com/notcooley" target="_blank">GitHub</a>
                <a href="https://wasatchmag.com/staff_name/aidan-cooley/" target="_blank">Wasatch Magazine</a>
                <a href="https://www.youtube.com/@aidancooley7991" target="_blank">YouTube Channel</a>
                    </div>
                </li>            -->
            </ul>
        </div>
    </nav>

    <main>
        <!-- Blog Header -->
        <div class="blog-header">
            <h1>Speaking to the Void</h1>
            <p>Thoughts, tutorials, and more</p>
        </div>

        <!-- Posts Container - populated dynamically -->
        <div id="posts-container"></div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Aidan Cooley. All rights reserved.</p>
    </footer>
</body>
</html>
